baseURL = 'https://blog.pzhat.id.vn/'
languageCode = 'en-us'
title = 'Phat Mai Blog'
theme = 'PaperMod'

[params]
  defaultTheme = 'auto'  # hoặc 'light', 'dark'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  comments = false
  
  # Home-Page Mode (dạng list bài viết)
  homeInfoParams = { Title = "Hello", Content = "Mình chia sẻ về CTF, Security, và Dev stuff." }
  
  # Social Icons
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/yourusername"
  [[params.socialIcons]]
    name = "twitter" 
    url = "https://twitter.com/yourusername"

# Menu
[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 30

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
