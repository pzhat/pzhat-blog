baseURL = 'https://blog.pzhat.id.vn/'
languageCode = 'en-us'
title = 'Phat Mai Blog'
theme = 'PaperMod'

# SEO & Meta
[params]
  env = "production"
  description = "Blog cá nhân về CTF, Security và Development"
  author = "Phat Mai"
  defaultTheme = "auto"
  
  # Display settings
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  ShowRssButtonInSectionTermList = true
  ShowAllPagesInArchive = true
  ShowPageNums = true
  comments = false
  
  # Home page config
  homeInfoParams = { Title = "Hello", Content = "Welcome to my blog. Nơi chia sẻ về CTF writeups, security research và development stuff." }
  
  # Social icons
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/pzhat"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/phat-mai-hong-2580a52aa/"

# Menu navigation
[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "archives"
  name = "Archives"
  url = "/archives/"
  weight = 3

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 4

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 5

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 6

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# Build settings
enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

# Main sections
[params.mainSections]
  mainSections = ["posts"]

# Assets
[assets]
  disableHLJS = false

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = "monokai"
# Sort settings
[params]
  orderBy = "date"
  orderDesc = true

# Hoặc thêm vào section config
[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
