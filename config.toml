baseURL = 'https://blog.pzhat.id.vn/'
languageCode = 'en-us'
title = 'Phat Mai Blog'
theme = 'PaperMod'

[params]
  env = "production"
  description = "Blog cá nhân về CTF, Security và Development"
  author = "Phat Mai"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  comments = false

  [params.profileMode]
    enabled = true
    title = "Phat Mai"
    subtitle = "Security Researcher | Penetration tester"
    imageUrl = "https://github.com/pzhat.png"
    imageWidth = 160
    imageHeight = 160
    imageTitle = "Phat Mai"
    
    [[params.profileMode.buttons]]
      name = "📚 Posts"
      url = "/posts/"
    [[params.profileMode.buttons]]
      name = "🐙 GitHub"
      url = "https://github.com/pzhat"
    [[params.profileMode.buttons]]
      name = "📧 About"
      url = "/about/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/pzhat"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/phat-mai-hong-2580a52aa/"

  [params.mainSections]
    mainSections = ["posts"]

[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 3

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 4

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

[assets]
  disableHLJS = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = "monokai"
    tabWidth = 4
