baseURL = 'https://blog.pzhat.id.vn/'
languageCode = 'en-us'
title = 'Phat Mai Blog'
theme = 'PaperMod'

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  comments = false
  homeInfoParams = { Title = "Xin chào 👋", Content = "Chào mừng đến với blog của mình." }
  
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/pzhat"

# QUAN TRỌNG: mainSections phải nằm TRONG [params]
[params.mainSections]
  mainSections = ["posts"]

[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "categories"
  name = "Categories"
  url = "/categories/"
  weight = 3

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 4

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
